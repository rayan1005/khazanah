name: khazanah
description: "خزانة — تطبيق إعلانات الملابس والحقائب المستعملة"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  cloud_functions: ^5.3.4

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # UI / Images
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Utilities
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  intl: ^0.19.0
  timeago: ^3.7.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
